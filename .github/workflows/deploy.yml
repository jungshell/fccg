name: Deploy to Production

on:
  workflow_dispatch:  # 수동 트리거만 허용
    inputs:
      confirm:
        description: '배포를 확인했습니다 (yes 입력)'
        required: true
        type: string

jobs:
  quality-check:
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js (Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Frontend build
        run: |
          cd frontend
          npm run build
      
      - name: Frontend type check
        run: |
          cd frontend
          npx tsc --noEmit
      
      - name: Frontend lint (fail on errors)
        run: |
          cd frontend
          npm run lint

      - name: Setup Node.js (Backend)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Backend build
        run: |
          cd backend
          npm run build

  deploy-render:
    needs: quality-check
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          curl --fail --show-error --silent -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-vercel:
    needs: quality-check
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          curl --fail --show-error --silent -X POST "$VERCEL_DEPLOY_HOOK_URL"
